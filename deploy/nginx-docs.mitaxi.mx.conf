# MiTaxi documentation — nginx vhost for docs.mitaxi.mx
#
# Install:
#   sudo cp deploy/nginx-docs.mitaxi.mx.conf /etc/nginx/sites-available/docs.mitaxi.mx
#   sudo ln -sf /etc/nginx/sites-available/docs.mitaxi.mx /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d docs.mitaxi.mx

server {
    listen 80;
    listen [::]:80;
    server_name docs.mitaxi.mx;

    # Certbot will add HTTPS redirect + SSL block here.
    # Until then, serve HTTP (remove after certbot runs).
    root /var/www/mitaxi-docs/site;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # JSON content — short cache, always revalidate after deploy
    location ~* ^/content/.*\.json$ {
        add_header Cache-Control "public, max-age=300, must-revalidate";
        try_files $uri =404;
    }

    # Static assets (screenshots, logos, css, js)
    location ~* \.(css|js|png|jpe?g|gif|webp|svg|ico|woff2?)$ {
        add_header Cache-Control "public, max-age=604800, immutable";
        try_files $uri =404;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    access_log /var/log/nginx/docs.mitaxi.mx.access.log;
    error_log  /var/log/nginx/docs.mitaxi.mx.error.log;
}